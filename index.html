<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meme Library</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>Meme Library</h1>
        <p id="summary">选择图片文件夹后开始整理。</p>
      </div>
      <label class="button">
        选择文件夹
        <input id="folderInput" type="file" accept="image/*" webkitdirectory multiple />
      </label>
    </header>

    <section class="intent-panel">
  <h2>生成梗图</h2>
  <div class="intent-grid">
    <textarea id="intentInput" rows="3" placeholder="输入你想表达的内容，例如：我想表达拒绝手动干活，直接用 AI"></textarea>
   <button id="recommendButton" type="button" onclick="renderRecommendations()">推荐 Top5</button>
  </div>

  <div class="intent-examples">
    <button type="button" data-example="我想表达拒绝手动干活，直接用 AI">拒绝手动干活</button>
    <button type="button" data-example="我想吐槽老板说这个需求很简单">吐槽需求很简单</button>
    <button type="button" data-example="我想表达我被一句话震惊到了">被一句话震惊</button>
    <button type="button" data-example="我想表达表面很淡定，内心已经崩溃">表面淡定内心崩溃</button>
  </div>

  <p id="recommendationSummary" class="recommendation-summary">输入你的想法，系统会从模板库里推荐最合适的梗图。</p>
  <div id="recommendations" class="recommendations"></div>

<div id="composerPanel" class="composer-modal" hidden>
  <div class="composer-modal-card">
    <button id="closeComposerButton" class="composer-close" type="button" aria-label="关闭生成弹窗">×</button>

    <h2>生成结果</h2>

    <div class="composer-layout">
      <canvas id="memeCanvas" width="900" height="900"></canvas>

      <div class="composer-controls">
        <label>
          上方文字
          <input id="topTextInput" type="text" placeholder="可选，例如：以前的我" />
        </label>

        <label>
          下方文字
          <textarea id="bottomTextInput" rows="4" placeholder="输入要放到图片上的文字"></textarea>
        </label>

        <button id="renderMemeButton" type="button">重新生成</button>
        <button id="downloadMemeButton" type="button">下载图片</button>
      </div>
    </div>
  </div>
</div>
      
</section>
    
    <section class="controls">
      <input id="searchInput" type="search" placeholder="搜索文件名或标签" />
      <select id="sortSelect">
        <option value="newest">最新优先</option>
        <option value="oldest">最早优先</option>
        <option value="name">文件名</option>
        <option value="favorite">收藏优先</option>
      </select>
      <label class="check">
        <input id="favoritesOnly" type="checkbox" />
        只看收藏
      </label>
    </section>

<section class="upload-panel">
  <h2>添加 meme</h2>
  <div class="upload-grid">
    <input id="cloudFileInput" type="file" accept="image/*" />
    <input id="cloudTitleInput" type="text" placeholder="标题，例如：上班状态" />
    <input id="cloudTagsInput" type="text" placeholder="标签，例如：工作 搞笑 reaction" />
    <button id="cloudUploadButton" type="button" onclick="uploadCloudMeme()">上传到云端</button>
  </div>
  <p id="uploadStatus">上传组件等待脚本加载。</p>
</section>
    
    <section id="gallery" class="gallery"></section>

    <section id="emptyState" class="empty">
      <h2>还没有图片</h2>
      <p>点击“选择文件夹”，选择你的 meme 图片目录。</p>
    </section>
  </main>

  <dialog id="dialog">
    <button id="closeDialog" class="close">×</button>
    <img id="previewImage" alt="" />
    <aside>
      <h2 id="detailName"></h2>
      <p id="detailMeta"></p>
      <label>
        标签
        <input id="tagInput" type="text" placeholder="例如 reaction, funny, work" />
      </label>
      <button id="favoriteButton">收藏</button>
      <button id="copyButton">复制文件名</button>
    </aside>
  </dialog>

  <script src="script.js"></script>
</body>
</html>
